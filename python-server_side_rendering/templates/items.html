<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items List</title>
</head>
<body>
    {% include 'header.html' %}

    <h1>Items List</h1>

    <ul>
        {% if items|length == 0 %}
            <li>No items found</li>
        {% else %}
            {% for item in items %}
                <li>{{ item }}</li>
            {% endfor %}
        {% endif %}
    </ul>

    {% include 'footer.html' %}
</body>
</html>
